<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WoodArt{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="logo">WoodArt</a>
            <button class="menu-toggle">☰</button>
            <nav>
                <div class="dropdown">
                    <a href="#">Todas las categorias</a>
                    <div class="dropdown-content">
                        <a href="#">Maderas</a>
                        <a href="#">Muebles</a>
                        <a href="#">Herrajes</a>
                        <a href="#">Pisos</a>
                        <a href="#">Puertas</a>
                    </div>
                </div>
                <form action="/buscar.html" method="get">
                    <input type="text" name="q" placeholder="¿Que buscas?. . .">
                    <button type="submit">Buscar</button>
                </form>
                <a href="/login">Ingresar</a>
                <a href="/carrito"><ion-icon name="cart-outline"></ion-icon></a>
            </nav>
        </div>
    </header>
    <div class="page-content">
        {% block content %}{% endblock %}
    </div>
    {% block footer %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
